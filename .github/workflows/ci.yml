name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tracking,torch,ray,dev]"

      - name: Lint (ruff)
        run: ruff check src tests workflows

      - name: Format check (ruff)
        run: ruff format --check src tests workflows

      - name: Types (mypy, strict)
        run: mypy

      # Split out deliberately. When CI goes red, the first thing I want to know
      # is WHICH KIND of red: a broken unit test is an inconvenience, a violated
      # scientific constraint is a different category of problem entirely and
      # should be legible as such from the job list alone.
      - name: Unit tests
        run: pytest tests/test_mechanistic.py -v

      - name: Scientific constraint tests
        run: pytest tests/test_scientific_constraints.py -v

      - name: Regression tests (golden values + feature contract)
        run: pytest tests/test_regression.py -v

      - name: New modules (torch, inference, registry, rollout, reporting)
        run: pytest tests/test_torch_correction.py tests/test_inference.py tests/test_registry.py tests/test_rollout.py tests/test_reporting.py -v

      - name: Coverage
        run: pytest --cov=hybridbio --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hybridbio:latest .

      - name: Smoke test Docker image
        run: docker run --rm hybridbio:latest train --out-dir /tmp/model --n-batches 8 --n-test 2
